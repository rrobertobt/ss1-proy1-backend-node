version: '3.8'

services:
  api:
    build:
      context: .
      target: builder # Use builder stage for development
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - NODE_ENV=development
      - DB_HOST=postgres
      - DB_PORT=5433
      - DB_USERNAME=${DB_USERNAME:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - DB_NAME=${DB_NAME:-vinyl_store}
    volumes:
      - ./:/app:delegated
      - /app/node_modules
      # Named volume for node_modules to prevent Windows path issues
      - nodemodules:/app/node_modules
    depends_on:
      - postgres
    # Use more reliable path for Windows compatibility
    command: sh -c "npm run start:dev"

  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=${DB_USERNAME:-postgres}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-postgres}
      - POSTGRES_DB=${DB_NAME:-vinyl_store}
    command: -p 5433
    ports:
      - "5433:5433"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./src/resources:/docker-entrypoint-initdb.d

volumes:
  postgres_data:
    driver: local
  nodemodules:
    driver: local
